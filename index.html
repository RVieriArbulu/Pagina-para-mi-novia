<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Para ti ❤️</title>
</head>

<body>
    <div id="cielo-estrellas"></div>

    <!-- CONTENEDOR DE CORAZONES -->
    <div id="corazones-fondo"></div>

    <!-- Música (oculta) -->
<audio id="musica">
    <source src="assets/Rosapastel.mp3" type="audio/mpeg">
</audio>

    <!-- VENTANA BIENVENIDA -->
    <div id="bienvenida">
        <div id="ventana">
            <p>Gracias por existir en mi vida ❤️</p>
            <button onclick="cerrarVentana()">Entrar</button>
        </div>
    </div>

    <!-- VENTANA MENSAJE SECRETO -->
    <div id="ventana-secreta">
        <div id="contenido-secreto">
            <p id="texto-secreto"></p>
            <button onclick="cerrarSecreto()">Cerrar</button>
        </div>
    </div>

    <h1>HOLA MI NEGRITA HERMOSA 🥰</h1>
    <h2>Hoy cumplimos 11 meses de novios y 12 meses de mejores amigos</h2>
    <div id="contador"></div>

    <button onclick="modoNoche()" id="botonModo">🌙 Activar modo noche</button><br>
    <button id="botonMusica" onclick="toggleMusica()">Pausar música</button>
    <img src="https://i.postimg.cc/d0qzvrbT/foto.jpg" alt="Nosotros" id="foto" onclick="corazonesExtra()">

    <button onclick="mensaje()">Leer mensaje</button>
    <p id="sorpresa"></p>

    <!-- GALERÍA -->
    <h2 style="color:#d63384;margin-top:40px;">NUESTROS MOMENTOS 📸</h2>
    <div class="galeria-contenedor">
        <button class="prev" onclick="moverGaleria(-1)">❮</button>
        <div class="galeria">
            <div class="slider" id="slider">
                <img src="https://i.postimg.cc/fTnsk0Ng/foto1.jpg">
                <img src="https://i.postimg.cc/267QvZJp/foto2.jpg">
                <img src="https://i.postimg.cc/mg17jqqH/foto3.jpg">
                <img src="https://i.postimg.cc/Rh0HHbKL/foto4.jpg">
                <img src="https://i.postimg.cc/tgTJDV72/foto5.jpg">
                <img src="https://i.postimg.cc/ZqGm39NV/foto6.jpg">
                <img src="https://i.postimg.cc/rsJ2vQP9/foto7.jpg">
                <img src="https://i.postimg.cc/nc3t2S7X/foto8.jpg">
                <img src="https://i.postimg.cc/Nf3k3BRD/foto9.jpg">
            </div>
        </div>
        <button class="next" onclick="moverGaleria(1)">❯</button>
    </div>
    <div class="indicadores" id="indicadores"></div>

    <button onclick="mostrarPoema()">Leer poema</button>
    <p id="poema"></p>

    <script src="script.js"></script>
</body>
</html>
